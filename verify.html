<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying Subscription  Vedtam Tech Solutions</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #334155;
      border-top-color: #fb923c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { color: #f8fafc; font-size: 1.6rem; margin-bottom: 12px; }
    p  { color: #94a3b8; font-size: 0.95rem; line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .secondary { display: block; margin-top: 14px; color: #64748b; font-size: 0.85rem; text-decoration: none; }
    .secondary:hover { color: #94a3b8; }
  </style>
  <style id="mega-menu-desktop-zoom-fix">
    /* Mega Menu Zoom Overflow Fix for all screen sizes */
    .mega-menu {
      max-height: calc(100vh - 80px) !important;
      overflow-y: auto !important;
    }
    .mega-menu::-webkit-scrollbar {
      width: 6px;
    }
    .mega-menu::-webkit-scrollbar-thumb {
      background-color: rgba(6, 182, 212, 0.5);
      border-radius: 10px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
</head>
<body>
  <div class="card">
    <div class="icon" id="icon" style="background:#33415533;">
      <div class="spinner"></div>
    </div>
    <h1 id="headline">Verifying your subscription&hellip;</h1>
    <p id="subtext">Please wait while we confirm your email address.</p>
    <a id="btn" href="https://vedtam.com/cert-advisory" class="btn" style="display:none">View CERT-In Advisories &rarr;</a>
    <a id="secondary" href="https://vedtam.com" class="secondary" style="display:none">&larr; Back to Vedtam Home</a>
  </div>

  <script>
    (function () {
      var token = new URLSearchParams(window.location.search).get('token');

      if (!token) {
        show('error', '&#10007;', '#e63946', 'No Token Found',
          'No verification token was found. Please use the exact link from your confirmation email.');
        return;
      }

      fetch('verify-subscriber.php?token=' + encodeURIComponent(token) + '&format=json')
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var colors = { success: '#06d6a0', duplicate: '#06d6a0', expired: '#f9c74f', error: '#e63946' };
          var icons  = { success: '&#10003;', duplicate: '&#10003;', expired: '&#9201;', error: '&#10007;' };
          var msg = d.message || '';
          if (d.status === 'success' && d.name) {
            msg += ' ' + d.name + ', check your inbox for a welcome email.';
          }
          show(d.status, icons[d.status] || '&#10007;', colors[d.status] || '#e63946', d.headline, msg);
        })
        .catch(function () {
          show('error', '&#10007;', '#e63946', 'Connection Error',
            'Could not reach the server. Please try again or contact info@vedtam.com.');
        });

      function show(status, icon, color, headline, msg) {
        var iconEl = document.getElementById('icon');
        iconEl.style.background = color + '22';
        iconEl.style.color = color;
        iconEl.innerHTML = icon;
        document.getElementById('headline').textContent = headline;
        document.getElementById('subtext').textContent  = msg;
        document.getElementById('btn').style.display      = 'inline-block';
        document.getElementById('secondary').style.display = 'block';
        document.title = headline + '  Vedtam Tech Solutions';
      }
    }());
  </script>
<div aria-label="Quick actions" class="floating-actions">
    <a aria-label="Chat on WhatsApp" class="whatsapp-float" href="https://wa.me/917065111015" rel="noopener"
      target="_blank">
      <svg aria-hidden="true" fill="currentColor" viewbox="0 0 24 24">

    </a>
    <button aria-label="Scroll to top" class="scroll-top" id="scrollTop"

        <path d="M12 19V5M6 11l6-6 6 6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
          stroke-width="2.5"></path>

  </div>
</body>
</html>
