name: Refresh CERT Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  refresh-cert-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh CERT-In dataset
        run: npm run update:cert

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- cert-data.json cert-update-log.txt; then
            echo "No feed changes detected."
            exit 0
          fi
          git add cert-data.json cert-update-log.txt
          git commit -m "chore: refresh CERT-In feed"
          git push
